{% extends 'index.html' %}
{% block content %}
<div class="max-w-xl mx-auto bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-xl mt-10">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-white">Edit User: {{ user.username }}</h2>
        <a href="{{ url_for('admin_dashboard') }}" class="text-gray-400 hover:text-white">← Back to Dashboard</a>
    </div>

    <form method="POST" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Username</label>
            <input type="text" name="username" value="{{ user.username }}" required class="w-full p-3 bg-gray-900 rounded-lg border border-gray-600 focus:border-blue-500 text-white">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Email Address</label>
            <input type="email" name="email" value="{{ user.email }}" required class="w-full p-3 bg-gray-900 rounded-lg border border-gray-600 focus:border-blue-500 text-white">
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-400 mb-1">Role</label>
            <select name="role" class="w-full p-3 bg-gray-900 rounded-lg border border-gray-600 focus:border-blue-500 text-white">
                <option value="regular" {% if user.role == 'regular' %}selected{% endif %}>Regular</option>
                <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
            </select>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-500 transition-colors mt-4">
            Save Changes
        </button>
    </form>
</div>
{% endblock %}
