{% extends 'index.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-md bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-xl">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold text-white">Welcome Back</h2>
            <p class="text-gray-400 mt-2 text-sm">Please sign in to your account</p>
        </div>

        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Username</label>
                <input 
                    type="text" 
                    name="username" 
                    required 
                    autofocus
                    class="w-full p-3 bg-gray-900 rounded-lg border border-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-white outline-none transition-colors"
                    placeholder="Enter your username"
                >
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Password</label>
                <input 
                    type="password" 
                    name="password" 
                    required 
                    class="w-full p-3 bg-gray-900 rounded-lg border border-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-white outline-none transition-colors"
                    placeholder="••••••••"
                >
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded-lg font-semibold hover:bg-blue-500 transition-colors duration-200 mt-2 shadow-lg shadow-blue-900/20">
                Sign In
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-400 border-t border-gray-700 pt-6">
            Don't have an account? 
            <a href="{{ url_for('register') }}" class="text-blue-400 hover:text-blue-300 font-medium transition-colors">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
